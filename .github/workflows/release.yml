name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # arm64 runner — the DMG and the Swift simulator CLI target Apple Silicon.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Bump version
        id: bump
        run: |
          cd apps/desktop
          npm version "${{ inputs.bump }}" --no-git-tag-version
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/package.json
          git commit -m "release: v$VERSION"
          git tag "v$VERSION"
          git push origin HEAD:main "v$VERSION"

      - name: Build testcat-sim (Swift)
        run: swift build --package-path native/testcat-sim -c release

      - name: Package desktop app
        run: CSC_IDENTITY_AUTO_DISCOVERY=false pnpm --filter @testcat/desktop package

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          gh release create "v$VERSION" \
            apps/desktop/release/*.dmg \
            apps/desktop/release/*-mac.zip \
            --title "v$VERSION" \
            --generate-notes \
            --notes "> Unsigned build — first open with right-click → Open, or \`xattr -cr /Applications/testcat.app\`."
